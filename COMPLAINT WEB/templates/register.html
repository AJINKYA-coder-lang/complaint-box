{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: 4rem auto;">
    <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary);">Create Account</h2>
    <form method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" class="form-control" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control" required placeholder="john@college.edu">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required placeholder="Choose a strong password">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role" id="roleSelect" class="form-control" onchange="toggleDept()">
                <option value="student">Student</option>
                <option value="department">Department Staff</option>
            </select>
        </div>
        <div class="form-group" id="deptGroup" style="display: none;">
            <label>Select Your Department</label>
            <select name="dept_id" class="form-control">
                <option value="" disabled selected>-- Choose Department --</option>
                {% for d in departments %}
                    <option value="{{ d.dept_id }}">{{ d.dept_name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Login here</a>
    </p>
</div>

<script>
    function toggleDept() {
        var role = document.getElementById('roleSelect').value;
        var deptGroup = document.getElementById('deptGroup');
        if(role === 'department') {
            deptGroup.style.display = 'block';
        } else {
            deptGroup.style.display = 'none';
        }
    }
</script>
{% endblock %}
