{% extends 'base.html' %}

{% block content %}
<div class="dashboard-header">
    <h2>Submit New Complaint</h2>
    <a href="{{ url_for('user_dashboard') }}" class="btn btn-outline">&larr; Back to Dashboard</a>
</div>

<div class="glass-panel" style="max-width: 600px; margin: 0 auto;">
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" class="form-control" required placeholder="Brief title of the issue">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select name="category" class="form-control" required>
                <option value="IT & WiFi">IT & WiFi</option>
                <option value="Hostel & Accommodation">Hostel & Accommodation</option>
                <option value="Library">Library</option>
                <option value="Canteen">Canteen & Food</option>
                <option value="Academics">Academics</option>
                <option value="Infrastructure">Infrastructure</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Priority Level</label>
            <select name="priority" class="form-control">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High" style="color: var(--danger); font-weight: bold;">High</option>
            </select>
        </div>
        <div class="form-group">
            <label>Detailed Description</label>
            <textarea name="description" class="form-control" rows="5" required placeholder="Provide as much detail as possible..."></textarea>
        </div>
        <div class="form-group">
            <label>Attach Proof (Optional)</label>
            <input type="file" name="proof" class="form-control" accept="image/*,.pdf,.doc,.docx">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Complaint</button>
    </form>
</div>
{% endblock %}
